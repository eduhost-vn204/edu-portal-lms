name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy (attempt 1)
        id: deploy1
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Cho roi thu lai lan 2
        if: steps.deploy1.outcome == 'failure'
        run: sleep 15

      - name: Deploy (attempt 2)
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Cho roi thu lai lan 3
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 30

      - name: Deploy (attempt 3 - cuoi cung)
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v4
